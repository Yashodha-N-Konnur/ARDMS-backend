# Docker Profile Configuration
spring:
  datasource:
    url: jdbc:mysql://mysql:3306/ardms_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:ardms_user}
    password: ${DB_PASSWORD:ardms_pass}
  jpa:
    show-sql: false

server:
  port: 8080

logging:
  level:
    com.ardms: INFO
    org.springframework: WARN
