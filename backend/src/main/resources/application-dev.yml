spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: true

    hibernate:
      ddl-auto: update

app:
  name: ARDMS
  version: 1.0.0
  description: Automated Release and Deployment Management System

logging:
  level:
    com.ardms: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG