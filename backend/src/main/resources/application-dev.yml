# Development Profile Configuration
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ardms_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ardms_user
    password: ardms_pass
  jpa:
    show-sql: true

logging:
  level:
    com.ardms: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
