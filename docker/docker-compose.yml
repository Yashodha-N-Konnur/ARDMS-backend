# =====================================================
# ARDMS - Docker Compose for Local Development
# =====================================================

services:

  # ────────────────────────────────────────────────────
  # MySQL Database
  # ────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0

    container_name: ardms-mysql

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ardms_db
      MYSQL_USER: ardms_user
      MYSQL_PASSWORD: ardms_pass

    ports:
      - "3307:3306"

    volumes:
      - mysql-data:/var/lib/mysql

    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-prootpassword"
        ]

      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

    networks:
      - ardms-network

  # ────────────────────────────────────────────────────
  # Spring Boot Backend
  # ────────────────────────────────────────────────────
  ardms-backend:

    build:
      context: ../backend
      dockerfile: Dockerfile

    container_name: ardms-backend

    restart: unless-stopped

    depends_on:
      mysql:
        condition: service_healthy

    environment:
      SPRING_PROFILES_ACTIVE: docker

      DB_URL: jdbc:mysql://mysql:3306/ardms_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

      DB_USERNAME: ardms_user
      DB_PASSWORD: ardms_pass

      JWT_SECRET: your-super-secret-jwt-key-min-256-bits-change-in-production

      JWT_EXPIRATION: 3600000
      JWT_REFRESH_EXPIRATION: 86400000

      SERVER_PORT: 8080

      LOG_PATH: /app/logs

      CORS_ORIGINS: http://localhost:3000,http://localhost:8082

    ports:
      - "8082:8080"

    volumes:
      - app-logs:/app/logs

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/api/actuator/health"
        ]

      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

    networks:
      - ardms-network

  # ────────────────────────────────────────────────────
  # Adminer (Optional DB GUI)
  # ────────────────────────────────────────────────────
  adminer:

    image: adminer:4.8.1

    container_name: ardms-adminer

    restart: unless-stopped

    depends_on:
      - mysql

    ports:
      - "8081:8080"

    environment:
      ADMINER_DEFAULT_SERVER: mysql

    networks:
      - ardms-network

# ────────────────────────────────────────────────────
# Networks
# ────────────────────────────────────────────────────
networks:
  ardms-network:
    driver: bridge

# ────────────────────────────────────────────────────
# Volumes
# ────────────────────────────────────────────────────
volumes:
  mysql-data:
  app-logs: